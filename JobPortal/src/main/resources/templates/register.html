<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Job Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center">Create an Account</h2>
            <form th:action="@{/register}" th:object="${user}" method="post" class="card card-body shadow">
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>I am a:</label>
                    <select th:field="*{role}" class="form-select">
                        <option value="STUDENT">Job Seeker (Student)</option>
                        <option value="EMPLOYER">Employer</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
